const imgCache={};
function loadLogos(){ const set={}; STOCKS.forEach(s=>{ set[s.key]=s.key+'.png'; }); for(const k in LOGOS) set[k]=LOGOS[k]; for(const k in set){ const im=new Image(); im.onload=()=>{imgCache[k]=im;}; im.onerror=()=>{}; im.src=set[k]; } }
// 로고를 원형 메달리온 안에 비율 유지하며 꽉 차게(잘리지 않게) 그림. pad: 원 안쪽 여백 비율
function drawLogoFit(im,cx,cy,R,pad){ const d=R*2*(pad==null?0.86:pad), sc=Math.min(d/im.width,d/im.height), w=im.width*sc, h=im.height*sc; ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.clip(); ctx.drawImage(im,cx-w/2,cy-h/2,w,h); ctx.restore(); }

let actx=null, master=null;
function initAudio(){ if(actx) return; actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=0.42; master.connect(actx.destination); }
function tone(f,dur,type,vol,slideTo){ if(!actx) return; const t=actx.currentTime; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||'triangle'; o.frequency.setValueAtTime(f,t); if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol||0.16,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g).connect(master); o.start(t); o.stop(t+dur); }
function noiseBurst(dur,vol,cut){ if(!actx) return; const n=actx.sampleRate*dur|0, buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0); for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.4); const s=actx.createBufferSource(); s.buffer=buf; const g=actx.createGain(); g.gain.value=vol||0.3; const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||900; s.connect(f).connect(g).connect(master); s.start(); }
function startBuzz(a){ if(!actx||a.buzz) return; const o=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain(),lfo=actx.createOscillator(),lg=actx.createGain(); o.type='sawtooth'; o.frequency.value=118; o2.type='square'; o2.frequency.value=176; lfo.type='sine'; lfo.frequency.value=26; lg.gain.value=9; lfo.connect(lg); lg.connect(o.frequency); g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.linearRampToValueAtTime(0.10,actx.currentTime+0.05); o.connect(g); o2.connect(g); g.connect(master); o.start(); o2.start(); lfo.start(); a.buzz={o,o2,lfo,g}; }
function stopBuzz(a){ if(!a||!a.buzz||!actx) return; const b=a.buzz; b.g.gain.linearRampToValueAtTime(0.0001,actx.currentTime+0.08); setTimeout(()=>{try{b.o.stop();b.o2.stop();b.lfo.stop();}catch(e){}},120); a.buzz=null; }

    else { ctx.fillStyle='#f8fafc'; ctx.beginPath(); ctx.moveTo(20,-5); ctx.lineTo(150,-2); ctx.lineTo(160,0); ctx.lineTo(150,2); ctx.lineTo(20,5); ctx.closePath(); ctx.fill(); ctx.fillStyle='#7c3aed'; rrect(6,-5,16,11,2); ctx.fill(); }
    ctx.globalAlpha=0.35+0.45*pr; ctx.strokeStyle='#c4b5fd'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(98,0); ctx.stroke(); ctx.globalAlpha=1;
    const tx=98, rad=Math.max(1,5+pr*18+Math.sin(fc*0.5)*2); const g=ctx.createRadialGradient(tx,0,0,tx,0,rad); g.addColorStop(0,'rgba(255,255,255,'+(0.45+0.5*pr)+')'); g.addColorStop(.45,'rgba(168,85,247,'+(0.2+0.7*pr)+')'); g.addColorStop(1,'rgba(124,58,237,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(tx,0,rad,0,7); ctx.fill();
    ctx.restore(); } }
  for(const s of slashes){ const k=s.life/s.max, prog=1-k;
    if(s.mode===1){ // 찌르기
      const lung=Math.sin(prog*Math.PI)*46; ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.base); ctx.translate(lung,0);
      ctx.globalAlpha=Math.min(1,k*1.8); ctx.strokeStyle='rgba(196,181,253,'+(0.55*k)+')'; ctx.lineWidth=20*k+4; ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(180,0); ctx.stroke();
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=9*k+2; ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(180,0); ctx.stroke();
      if(swordImg){ const L=168, sc=L/swordImg.width; ctx.shadowColor='rgba(124,58,237,0.65)'; ctx.shadowBlur=12; ctx.translate(L+8,0); ctx.scale(-sc,sc); ctx.drawImage(swordImg,0,-swordImg.height/2); }
      else { ctx.fillStyle='#f8fafc'; ctx.beginPath(); ctx.moveTo(20,-5); ctx.lineTo(180,-2); ctx.lineTo(188,0); ctx.lineTo(180,2); ctx.lineTo(20,5); ctx.closePath(); ctx.fill(); }
      ctx.restore(); ctx.globalAlpha=1;
    } else { // 베기
      const a0=s.base-1.0, a1=s.base+1.0, cur=a0+(a1-a0)*prog;
      ctx.globalAlpha=Math.min(1,k*1.6); ctx.strokeStyle='#ffffff'; ctx.lineWidth=34*k+7; ctx.beginPath(); ctx.arc(s.x,s.y,138,a0,cur); ctx.stroke();
      ctx.strokeStyle='rgba(196,181,253,'+(0.6*k)+')'; ctx.lineWidth=15*k+3; ctx.beginPath(); ctx.arc(s.x,s.y,165,a0,cur); ctx.stroke();
      ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(cur);
        if(swordImg){ const L=178, sc=L/swordImg.width; ctx.globalAlpha=Math.min(1,k*1.9); ctx.shadowColor='rgba(124,58,237,0.65)'; ctx.shadowBlur=12; ctx.translate(L+8,0); ctx.scale(-sc,sc); ctx.drawImage(swordImg,0,-swordImg.height/2); }
        else { ctx.fillStyle='#f8fafc'; ctx.beginPath(); ctx.moveTo(28,-7); ctx.lineTo(168,-3); ctx.lineTo(178,0); ctx.lineTo(168,3); ctx.lineTo(28,8); ctx.closePath(); ctx.fill(); ctx.fillStyle='#7c3aed'; rrect(16,-5,16,11,2); ctx.fill(); }
        ctx.restore(); ctx.globalAlpha=1;
    }
  }

  for(const p of projs){ if(p.t==='chip') drawHBM(p); else if(p.t==='torpedo') drawTorpedo(p); else if(p.t==='rocket') drawRocket(p); else if(p.t==='train') drawTrain(p); else if(p.t==='fist') drawFist(p); else if(p.t==='cellp') drawCellp(p); else if(p.t==='pill') drawPill(p); else if(p.t==='errbomb') drawErr(p); else if(p.t==='fruit') drawFruit(p); else if(p.t==='ramen') drawRamen(p); else if(p.t==='dumpling') drawDumpling(p); else if(p.t==='kemgi') drawKemgi(p); else if(p.t==='minion') drawMinion(p); }

  for(const a of F){ ctx.globalAlpha=0.1; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(a.x,a.y+a.r-1,a.r*0.95,a.r*0.32,0,0,7); ctx.fill(); ctx.globalAlpha=1; if(a.rage>0||a.berserk>0){ ctx.globalAlpha=.35; ctx.fillStyle=a.berserk>0?'#fbbf24':a.color; ctx.beginPath(); ctx.arc(a.x,a.y,a.r+6,0,7); ctx.fill(); ctx.globalAlpha=1; }
    ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,7); ctx.fillStyle=a.flash>0?a.color:(a.berserk>0?'#f59e0b':'#fff'); ctx.fill();
    ctx.lineWidth=2.5; ctx.strokeStyle='#111'; ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,7); ctx.stroke();
    if(a.shieldHP>0){ ctx.globalAlpha=0.7; ctx.strokeStyle='#22d3ee'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(a.x,a.y,a.r+5,0,7); ctx.stroke(); ctx.globalAlpha=1; }
    const _im=imgCache[a.key]; if(_im){ drawLogoFit(_im,a.x,a.y,a.r-4); } else { ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=(a.r*0.9|0)+'px serif'; ctx.fillText(a.emoji,a.x,a.y+1); }
    if(a.shock>0){ ctx.save(); ctx.lineWidth=2; const nb=2+(a.shock>3?1:0); for(let bi=0;bi<nb;bi++){ const a0=Math.random()*6.283; ctx.strokeStyle=Math.random()<.5?'#fde047':'#fef08a'; ctx.beginPath(); ctx.moveTo(a.x+Math.cos(a0)*(a.r+1),a.y+Math.sin(a0)*(a.r+1)); let aa=a0; for(let s2=0;s2<3;s2++){ aa+=(Math.random()-.5)*0.9; const rad=a.r+4+Math.random()*9; ctx.lineTo(a.x+Math.cos(aa)*rad,a.y+Math.sin(aa)*rad); } ctx.stroke(); } ctx.restore(); }
    if(a.stun>0){ ctx.font='24px serif'; ctx.fillText('💫',a.x,a.y-a.r-12); } }
  for(const a of F){ if(a.orbT>0){ const R=52,N=5; for(let i=0;i<N;i++){ const ang=a.orbAng+i*1.2566; const ox=a.x+Math.cos(ang)*R, oy=a.y+Math.sin(ang)*R; ctx.beginPath(); ctx.arc(ox,oy,11,0,7); ctx.fillStyle='#fde047'; ctx.fill(); ctx.lineWidth=2.5; ctx.strokeStyle='#a16207'; ctx.stroke(); ctx.beginPath(); ctx.moveTo(ox-3,oy+9); ctx.lineTo(ox+3,oy+9); ctx.lineTo(ox,oy+14); ctx.closePath(); ctx.fillStyle='#fde047'; ctx.fill(); } } }

  for(const e of booms){ const k=e.life/e.max; if(e.type==='fire'){ const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,Math.max(1,e.rr)); g.addColorStop(0,'rgba(255,255,255,'+(0.95*k)+')'); g.addColorStop(.35,'rgba(253,224,71,'+(0.85*k)+')'); g.addColorStop(.7,'rgba(249,115,22,'+(0.6*k)+')'); g.addColorStop(1,'rgba(220,38,38,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,e.rr,0,7); ctx.fill(); } else if(e.type==='ring'){ ctx.strokeStyle=(e.c||'#ffe89a'); ctx.globalAlpha=0.8*k; ctx.lineWidth=4*k+1.5; ctx.beginPath(); ctx.arc(e.x,e.y,e.rr,0,7); ctx.stroke(); ctx.globalAlpha=1; } }
  for(const q of parts){ ctx.globalAlpha=Math.max(0,q.life/q.max); ctx.fillStyle=q.c; ctx.beginPath(); ctx.arc(q.x,q.y,q.sz,0,7); ctx.fill(); } ctx.globalAlpha=1;
  for(const q of dnums){ ctx.globalAlpha=Math.max(0,q.life/q.max); ctx.fillStyle=q.c; ctx.textAlign='center'; ctx.font='900 '+(q.v[0]==='+'?18:20)+'px -apple-system,sans-serif'; ctx.strokeStyle='#fff'; ctx.lineWidth=3.5; ctx.strokeText(q.v,q.x,q.y); ctx.fillText(q.v,q.x,q.y); ctx.globalAlpha=1; }

  if(flashA>0.02){ ctx.fillStyle='rgba(255,255,255,'+Math.min(flashA,0.5)+')'; ctx.fillRect(BOX.x,BOX.y,BOX.w,BOX.h); }

  drawSide(F[0],16,'left'); drawSide(F[1],W-16,'right');

  if(introT>0){ ctx.textAlign='center'; ctx.fillStyle='rgba(0,0,0,.14)'; ctx.fillRect(BOX.x,BOX.y,BOX.w,BOX.h);
    const iy=BOX.y+BOX.h*0.40, ir=54, lx=BOX.x+BOX.w*0.27, rx=BOX.x+BOX.w*0.73;
    [[F[0],lx],[F[1],rx]].forEach(pair=>{ const ff=pair[0], fx=pair[1]; if(!ff) return; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(fx,iy,ir,0,7); ctx.fill(); const im=imgCache[ff.key]; if(im){ drawLogoFit(im,fx,iy,ir-4); } else { ctx.fillStyle='#111'; ctx.textBaseline='middle'; ctx.font='44px serif'; ctx.fillText(ff.emoji,fx,iy+2); } ctx.lineWidth=2.5; ctx.strokeStyle='#111'; ctx.beginPath(); ctx.arc(fx,iy,ir,0,7); ctx.stroke(); ctx.textBaseline='alphabetic'; ctx.fillStyle=ff.color; ctx.font='900 16px -apple-system,sans-serif'; ctx.fillText(ff.name,fx,iy+ir+24); });
    ctx.fillStyle='#111'; ctx.font='900 40px -apple-system,sans-serif'; ctx.fillText('VS',W/2,iy+13);
    ctx.font='900 52px -apple-system,sans-serif'; ctx.fillStyle=introT>26?'#111':'#dc2626'; ctx.fillText(introT>26?'READY':'FIGHT!',W/2,BOX.y+BOX.h*0.80); }
  if(!running && winner!==undefined){ ctx.fillStyle='rgba(255,255,255,.94)'; ctx.fillRect(BOX.x,BOX.y,BOX.w,BOX.h); ctx.textAlign='center'; if(winner){ const cx=W/2, _cy=BOX.y+212, R=66; const _wim=imgCache[winner.key];
    ctx.font='900 44px -apple-system,sans-serif'; ctx.fillStyle='#111'; ctx.fillText('K.O.',cx,BOX.y+80);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,_cy,R,0,7); ctx.fill();
    if(_wim){ drawLogoFit(_wim,cx,_cy,R-3); } else { ctx.font='90px serif'; ctx.fillStyle='#111'; ctx.fillText(winner.emoji,cx,_cy+16); }
    ctx.lineWidth=2.5; ctx.strokeStyle='#111'; ctx.beginPath(); ctx.arc(cx,_cy,R,0,7); ctx.stroke();
    ctx.font='900 34px -apple-system,sans-serif'; ctx.fillStyle=winner.color; ctx.fillText(winner.name+' 승리!',cx,_cy+R+54); } else { ctx.font='900 32px -apple-system,sans-serif'; ctx.fillStyle='#444'; ctx.fillText('무승부',W/2,BOX.y+BOX.h/2); } }
  ctx.restore(); }

function drawSide(a,xEdge,align){ const colW=242, x=align==='left'?xEdge:xEdge-colW; ctx.textBaseline='alphabetic'; ctx.fillStyle=a.color; ctx.textAlign=align; ctx.font='900 21px -apple-system,sans-serif'; ctx.fillText(a.name, align==='left'?x:xEdge, 558); const by=566,bh=26; ctx.fillStyle='#e5e7eb'; rrect(x,by,colW,bh,6); ctx.fill(); const _hr=a.hp/a.maxhp, _pl=0.5+0.5*Math.sin(fc*0.28); ctx.fillStyle=(_hr<0.25&&a.hp>0)?('rgb('+(220+(24*_pl|0))+','+(34+(26*_pl|0))+','+(34+(26*_pl|0))+')'):a.color; rrect(x,by,colW*_hr,bh,6); ctx.fill(); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='800 14px ui-monospace,monospace'; ctx.fillText(Math.round(a.hp)+' / '+a.maxhp, x+colW/2, by+18); const cy=600,ch=12; ctx.fillStyle='#e5e7eb'; rrect(x,cy,colW,ch,5); ctx.fill(); ctx.fillStyle=a.cg>=1?'#fbbf24':'#9ca3af'; rrect(x,cy,colW*Math.min(a.cg,1),ch,5); ctx.fill(); ctx.fillStyle='#374151'; ctx.textAlign=align; ctx.font='700 12px -apple-system,sans-serif'; ctx.fillText('특수기 · '+a.sName, align==='left'?x:xEdge, 632); let tag=''; if(a.shock>0)tag='⚡ 감전'; if(a.burn>0)tag='🔥 발화'; if(a.berserk>0)tag='📈 떡상!'; if(a.shieldHP>0)tag='🛡 보호막'; if(a.punchT>0)tag='🤖 난타!'; if(a.orbT>0)tag='💬 카톡공격'; if(a.stun>0)tag='💫 먹통'; if(tag){ ctx.fillStyle=a.stun>0?'#ca8a04':(a.berserk>0?'#7c3aed':(a.shock>0?'#ca8a04':'#f97316')); ctx.font='700 11px -apple-system,sans-serif'; ctx.fillText(tag, align==='left'?x:xEdge, 650); } }

function rrect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function line(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
// 고정 타임스텝: 디스플레이 주사율(60/120/144Hz, 가변 주사율)과 무관하게 항상 초당 60스텝으로 시뮬레이션
const STEP=1000/60; let _lastTS=0, _acc=0;
function loop(ts){ if(!running) return; ts=ts||performance.now(); if(!_lastTS)_lastTS=ts; _acc+=Math.min(ts-_lastTS,64); _lastTS=ts; let n=0;
  while(running && _acc>=STEP && n<6){ if(freeze>0){ freeze--; draw(); } else { update(); } _acc-=STEP; n++; }
  if(running) raf=requestAnimationFrame(loop); }

document.getElementById('start').onclick=()=>{ if(running) return; initAudio(); if(actx.state==='suspended') actx.resume(); try{ if(window.speechSynthesis){ const w=new SpeechSynthesisUtterance(' '); w.volume=0; speechSynthesis.speak(w); } }catch(e){} setup(); running=true; _lastTS=0; _acc=0; raf=requestAnimationFrame(loop); };
document.getElementById('rand').onclick=()=>{ let l=(Math.random()*STOCKS.length)|0,r; do{ r=(Math.random()*STOCKS.length)|0; }while(r===l); document.getElementById('left').value=l; document.getElementById('right').value=r; setup(); };
try{ fillSelects(); loadLogos(); setup(); var _dz=document.getElementById("diag"); if(_dz) _dz.style.display="none"; }catch(e){ _showErr((e&&e.stack)||e); }
</script>
